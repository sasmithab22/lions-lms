<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Staff Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --sidebar-bg: #0f172a;
  --sidebar-width: 260px;
  --accent: #10b981;
  --accent2: #059669;
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; min-height: 100vh; }

.sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); min-height: 100vh; position: fixed; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; z-index: 100; }
.sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.brand-name { font-size: 17px; font-weight: 800; color: #fff; }
.brand-sub { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }
.user-card { margin: 14px 12px 0; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #fff; font-weight: 700; flex-shrink: 0; }
.user-info-name { font-size: 13px; font-weight: 700; color: #f1f5f9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-info-role { font-size: 11px; color: #64748b; }
.nav-section { padding: 20px 12px 0; flex: 1; }
.nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #334155; padding: 0 8px; margin-bottom: 6px; margin-top: 16px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
.nav-item .nav-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
.nav-item.active { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
.logout-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: #ef4444; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
.logout-btn:hover { background: rgba(239,68,68,0.1); }

.main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
.topbar { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 18px; font-weight: 800; color: var(--text); }
.badge { display: inline-flex; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-staff { background: #dcfce7; color: #166534; }
.badge-subject { background: #dbeafe; color: #1d4ed8; }

.content { padding: 32px; flex: 1; }
.panel { display: none; }
.panel.active { display: block; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card { background: var(--surface); border-radius: 16px; padding: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
.stat-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.green  { background: #dcfce7; }
.stat-icon.blue   { background: #dbeafe; }
.stat-icon.purple { background: #ede9fe; }
.stat-icon.amber  { background: #fef3c7; }
.stat-value { font-size: 24px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 500; }

.card { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.card-title { font-size: 15px; font-weight: 700; color: var(--text); }
.btn { padding: 9px 18px; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-blue { background: #3b82f6; color: #fff; }
.btn-blue:hover { background: #2563eb; }

.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--bg); color: var(--muted); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
tbody td { padding: 13px 16px; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg); }

.sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.sub-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 18px; }
.sub-card h3 { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.sub-card p { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon">👩‍🏫</div>
      <div>
        <div class="brand-name">EduPortal</div>
        <div class="brand-sub">Staff Panel</div>
      </div>
    </div>
    <div class="user-card">
      <div class="user-avatar" id="avatarLetter">S</div>
      <div>
        <div class="user-info-name" id="sidebarName">Staff</div>
        <div class="user-info-role" id="sidebarSubject">—</div>
      </div>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-label">Monitoring</div>
    <button class="nav-item active" onclick="showTab('results', this)">
      <span class="nav-icon">📝</span> Test Results
    </button>
    <button class="nav-item" onclick="showTab('submissions', this)">
      <span class="nav-icon">📤</span> Submissions
    </button>
    <button class="nav-label" style="display:block;margin-top:16px">Tools</button>
    <button class="nav-item" onclick="showTab('attendance', this)">
      <span class="nav-icon">📅</span> Mark Attendance
    </button>
    <button class="nav-item" onclick="showTab('marks', this)">
      <span class="nav-icon">📊</span> Enter Marks
    </button>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">
      <span>🚪</span> Logout
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Test Results</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="badge badge-subject" id="subjectBadge">Subject</span>
      <span class="badge badge-staff">Staff</span>
    </div>
  </div>

  <div class="content">

    <!-- TEST RESULTS -->
    <div class="panel active" id="panel-results">
      <div class="stats-grid" id="resultStats"></div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">📝 Student Test Results</div>
          <button class="btn btn-blue btn-sm" onclick="downloadCSV()" style="padding:8px 16px;font-size:12px;border-radius:8px">
            ⬇ Export CSV
          </button>
        </div>
        <div class="table-wrap">
          <table id="resultsTable">
            <thead>
              <tr><th>#</th><th>Student</th><th>Test</th><th>Score</th><th>Date</th></tr>
            </thead>
            <tbody>
              <tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:30px">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SUBMISSIONS -->
    <div class="panel" id="panel-submissions">
      <div class="card">
        <div class="card-title">📤 Student Submissions</div>
        <div class="sub-grid" id="submissionGrid">
          <div style="color:#94a3b8">Loading…</div>
        </div>
      </div>
    </div>

    <!-- ATTENDANCE -->
    <div class="panel" id="panel-attendance">
      <div class="card">
        <div class="card-title">📅 Mark Attendance</div>
        <div id="attendanceForm" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:8px"></div>
        <div style="margin-top:20px">
          <button class="btn btn-primary" onclick="saveAllAttendance()">Save Attendance</button>
        </div>
      </div>
    </div>

    <!-- MARKS -->
    <div class="panel" id="panel-marks">
      <div class="card">
        <div class="card-title">📊 Enter Student Marks</div>
        <div style="margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap">
          <div>
            <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#64748b;display:block;margin-bottom:6px">Subject</label>
            <input id="marksSubject" placeholder="e.g. Mathematics" style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;color:#0f172a;outline:none;min-width:200px"/>
          </div>
          <div>
            <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#64748b;display:block;margin-bottom:6px">Date</label>
            <input type="date" id="marksDate" style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;color:#0f172a;outline:none"/>
          </div>
        </div>
        <div id="marksForm" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:20px"></div>
        <button class="btn btn-primary" onclick="saveAllMarks()">Save Marks</button>
      </div>
    </div>

  </div>
</div>

<script>
const user = JSON.parse(sessionStorage.getItem('user') || '{}');

if (!user.role || user.role !== 'staff') {
  window.location.href = '/';
}

document.getElementById('sidebarName').textContent    = user.name || 'Staff';
document.getElementById('avatarLetter').textContent   = (user.name || 'S')[0].toUpperCase();
const subject = user.data?.subject || '-';
document.getElementById('sidebarSubject').textContent = subject;
document.getElementById('subjectBadge').textContent   = subject;

const tabTitles = { results: 'Test Results', submissions: 'Submissions', attendance: 'Mark Attendance', marks: 'Enter Marks' };

function showTab(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
  document.getElementById('topbarTitle').textContent = tabTitles[name];
}

function logout() { sessionStorage.clear(); window.location.href = '/'; }

/* TEST RESULTS */
async function loadResults() {
  const res  = await fetch('/api/all-test-results');
  const data = await res.json();

  document.getElementById('resultStats').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon green">📝</div>
      <div><div class="stat-value">${data.length}</div><div class="stat-label">Tests Submitted</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">👨‍🎓</div>
      <div><div class="stat-value">${new Set(data.map(d => d.student)).size}</div><div class="stat-label">Students Attempted</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">⭐</div>
      <div><div class="stat-value">${data.length ? (data.reduce((s, d) => s + d.score, 0) / data.length).toFixed(1) : 0}</div><div class="stat-label">Avg Score</div></div>
    </div>
  `;

  let html = '';
  if (data.length === 0) {
    html = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:30px">No test results yet</td></tr>';
  } else {
    data.forEach((r, i) => {
      html += `<tr>
        <td style="color:#94a3b8">${i + 1}</td>
        <td style="font-weight:600">${r.student}</td>
        <td>${r.test}</td>
        <td><span style="font-weight:800;color:#10b981">${r.score}</span></td>
        <td style="color:#64748b">${r.date}</td>
      </tr>`;
    });
  }
  document.querySelector('#resultsTable tbody').innerHTML = html;
}

function downloadCSV() {
  let rows = [['Student','Test','Score','Date']];
  document.querySelectorAll('#resultsTable tbody tr').forEach(r => {
    const cols = r.querySelectorAll('td');
    if (cols.length === 5) rows.push([cols[1].innerText, cols[2].innerText, cols[3].innerText, cols[4].innerText]);
  });
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'student_results.csv';
  a.click();
}

/* SUBMISSIONS */
async function loadSubmissions() {
  const res  = await fetch('/api/all-submissions');
  const data = await res.json();
  let html   = '';

  if (data.length === 0) {
    html = '<div style="color:#94a3b8">No submissions yet.</div>';
  } else {
    data.forEach(x => {
      html += `
        <div class="sub-card">
          <h3>📄 ${x.file}</h3>
          <p>👨‍🎓 Student: <strong>${x.student}</strong></p>
          <p>📅 Date: ${x.date}</p>
          <a href="${x.download_url}" style="margin-top:12px;display:inline-block">
            <button class="btn btn-primary" style="margin-top:8px;font-size:12px;padding:7px 14px">⬇ Download</button>
          </a>
        </div>`;
    });
  }
  document.getElementById('submissionGrid').innerHTML = html;
}

/* ATTENDANCE - load student list */
async function loadAttendanceForm() {
  const res   = await fetch('/api/users/student');
  const users = await res.json();
  let html    = '';

  const today = new Date().toISOString().slice(0, 10);

  users.forEach(u => {
    html += `
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px">
        <div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:8px">${u.name}</div>
        <select data-student="${u.username}" data-date="${today}"
          style="width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:#0f172a;outline:none">
          <option value="Present">✅ Present</option>
          <option value="Absent">❌ Absent</option>
        </select>
      </div>`;
  });

  document.getElementById('attendanceForm').innerHTML = html;
}

async function saveAllAttendance() {
  const selects = document.querySelectorAll('#attendanceForm select');
  let promises  = [];

  selects.forEach(sel => {
    promises.push(fetch('/api/save-attendance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student: sel.dataset.student, date: sel.dataset.date, status: sel.value })
    }));
  });

  await Promise.all(promises);
  alert('Attendance saved successfully!');
}

/* MARKS - load student list */
async function loadMarksForm() {
  const res   = await fetch('/api/users/student');
  const users = await res.json();
  let html    = '';

  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('marksDate').value = today;

  users.forEach(u => {
    html += `
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px">
        <div style="font-size:13px;font-weight:700;color:#0f172a;flex:1">${u.name}</div>
        <input type="number" data-student="${u.username}" placeholder="Marks" min="0" max="100"
          style="width:80px;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:#0f172a;outline:none;text-align:center"/>
      </div>`;
  });

  document.getElementById('marksForm').innerHTML = html;
}

async function saveAllMarks() {
  const inputs  = document.querySelectorAll('#marksForm input[data-student]');
  const subject = document.getElementById('marksSubject').value.trim();
  const date    = document.getElementById('marksDate').value;

  if (!subject) { alert('Please enter a subject name'); return; }
  if (!date)    { alert('Please select a date'); return; }

  let promises = [];
  inputs.forEach(inp => {
    if (inp.value.trim()) {
      promises.push(fetch('/api/save-marks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student: inp.dataset.student, subject, date, mark: parseFloat(inp.value) })
      }));
    }
  });

  await Promise.all(promises);
  alert('Marks saved successfully!');
}

loadResults();
loadSubmissions();
loadAttendanceForm();
loadMarksForm();
</script>
</body>
</html>
